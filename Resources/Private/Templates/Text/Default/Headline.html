<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Element"/>
<f:section name="Content">
    <f:if condition="{data.header}">
        <f:switch expression="{data.header_layout}">
            <f:case value="1">
                <h1 class="{positionClass}">
                    <f:link.typolink parameter="{data.header_link}">{data.header}</f:link.typolink>
                </h1>
            </f:case>
            <f:case value="2">
                <h2 class="{positionClass}">
                    <f:link.typolink parameter="{data.header_link}">{data.header}</f:link.typolink>
                </h2>
            </f:case>
            <f:case value="3">
                <h3 class="{positionClass}">
                    <f:link.typolink parameter="{data.header_link}">{data.header}</f:link.typolink>
                </h3>
            </f:case>
            <f:case value="4">
                <h4 class="{positionClass}">
                    <f:link.typolink parameter="{data.header_link}">{data.header}</f:link.typolink>
                </h4>
            </f:case>
            <f:case value="5">
                <h5 class="{positionClass}">
                    <f:link.typolink parameter="{data.header_link}">{data.header}</f:link.typolink>
                </h5>
            </f:case>
            <f:case value="6">
                <h6 class="{positionClass}">
                    <f:link.typolink parameter="{data.header_link}">{data.header}</f:link.typolink>
                </h6>
            </f:case>
            <f:case value="100">
                <f:comment> -- do not show header -- </f:comment>
            </f:case>
            <f:defaultCase>
                <h2 class="{positionClass}">
                    <f:link.typolink parameter="{data.header_link}">{data.header}</f:link.typolink>
                </h2>
            </f:defaultCase>
        </f:switch>
    </f:if>
</f:section>
</html>
